@if (open()) {
  <section class="add-panel">
    <div class="panel-header">
      <h3>New khata entry</h3>
      <button mat-icon-button type="button" (click)="closed.emit()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <form [formGroup]="form" class="panel-form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Principal</mat-label>
        <input matInput formControlName="principal" appIndianAmount />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Rate %</mat-label>
        <input matInput type="number" step="0.01" formControlName="ratePercent" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Rate basis</mat-label>
        <mat-select formControlName="rateBasis">
          @for (opt of rateBasisOptions; track opt.value) {
            <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Start date</mat-label>
        <input matInput type="date" formControlName="startDate" />
      </mat-form-field>

      <div class="preview">
        <span class="preview-label">Vyaj accrued as of today</span>
        <span class="preview-value">Rs. {{ previewGrossVyaj() | indianCurrency }}</span>
      </div>

      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || saving()">
        Save entry
      </button>
    </form>
  </section>
}
